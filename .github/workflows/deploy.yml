name: Deploy

# Deploys are manual (workflow_dispatch) rather than automatic on every push.
# This repo has no real AWS account wired up, so an auto-deploy would fail at
# credential configuration on every green Test run. Trigger this by hand from
# the Actions tab when real AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY secrets
# are configured; without them the AWS steps skip cleanly instead of erroring.
on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Node.js (for CDK)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check for AWS credentials
        id: creds
        run: |
          if [ -n "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::AWS credentials not configured — skipping deploy steps."
          fi

      - name: Configure AWS credentials
        if: steps.creds.outputs.available == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Install CDK
        if: steps.creds.outputs.available == 'true'
        run: npm install -g aws-cdk

      - name: Install Python dependencies
        if: steps.creds.outputs.available == 'true'
        run: pip install -r infrastructure/requirements.txt -r requirements-dev.txt

      - name: CDK diff (show what will change)
        if: steps.creds.outputs.available == 'true'
        working-directory: infrastructure
        run: cdk diff --all

      - name: CDK deploy
        if: steps.creds.outputs.available == 'true'
        working-directory: infrastructure
        run: cdk deploy --all --require-approval never --outputs-file ../cdk-outputs.json

      - name: Store outputs as artifact
        if: steps.creds.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: cdk-outputs
          path: cdk-outputs.json
